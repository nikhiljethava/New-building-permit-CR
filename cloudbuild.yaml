steps:
  # Build Compliance Agent
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/agent:$COMMIT_SHA', '-t', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/agent:latest', './agent']
    id: 'build-agent'
  
  # Push Compliance Agent
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/agent:latest']
    id: 'push-agent'
    waitFor: ['build-agent']

  # Build Contractor Agent
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/contractor-agent:$COMMIT_SHA', '-t', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/contractor-agent:latest', './contractor-agent']
    id: 'build-contractor-agent'

  # Push Contractor Agent
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/contractor-agent:latest']
    id: 'push-contractor-agent'
    waitFor: ['build-contractor-agent']

  # Build Assessor MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/assessor-mcp-server:$COMMIT_SHA', '-t', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/assessor-mcp-server:latest', './assessor-mcp-server']
    id: 'build-assessor-mcp'

  # Push Assessor MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/assessor-mcp-server:latest']
    id: 'push-assessor-mcp'
    waitFor: ['build-assessor-mcp']

  # Build API Gateway
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/api:$COMMIT_SHA', '-t', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/api:latest', './api']
    id: 'build-api'

  # Push API Gateway
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/api:latest']
    id: 'push-api'
    waitFor: ['build-api']

  # Build Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/frontend:$COMMIT_SHA', 
      '-t', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/frontend:latest', 
      '--build-arg', 'PROJECT_ID=$PROJECT_ID',
      '--build-arg', 'VITE_GOOGLE_MAPS_API_KEY=$_GOOGLE_MAPS_API_KEY',
      './frontend'
    ]
    id: 'build-frontend'

  # Push Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/frontend:latest']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # Deploy Contractor Agent
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'building-permit-contractor-agent',
      '--image', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/contractor-agent:latest',
      '--platform', 'managed',
      '--region', '${_LOCATION}',
      '--allow-unauthenticated',
      '--set-env-vars', 'GOOGLE_CLOUD_AGENT_ENGINE_ENABLE_TELEMETRY=true,OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT=true'
    ]
    id: 'deploy-contractor-agent'
    waitFor: ['push-contractor-agent']

  # Deploy Assessor MCP Server
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'building-permit-assessor-mcp',
      '--image', '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/assessor-mcp-server:latest',
      '--platform', 'managed',
      '--region', '${_LOCATION}',
      '--allow-unauthenticated',
      '--port', '8002'
    ]
    id: 'deploy-assessor-mcp'
    waitFor: ['push-assessor-mcp']

  # Deploy Compliance Agent
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        ASSESSOR_URL=$$(gcloud run services describe building-permit-assessor-mcp --platform managed --region ${_LOCATION} --format='value(status.url)')
        CONTRACTOR_URL=$$(gcloud run services describe building-permit-contractor-agent --platform managed --region ${_LOCATION} --format='value(status.url)')
        
        gcloud run deploy building-permit-agent \
          --image ${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/agent:latest \
          --platform managed \
          --region ${_LOCATION} \
          --allow-unauthenticated \
          --set-env-vars "CONTRACTOR_AGENT_URL=$$CONTRACTOR_URL/a2a/building_permit_contractor_agent/.well-known/agent-card.json,ASSESSOR_MCP_SERVER_URL=$$ASSESSOR_URL,GOOGLE_CLOUD_AGENT_ENGINE_ENABLE_TELEMETRY=true,OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT=true"
    id: 'deploy-agent'
    waitFor: ['push-agent', 'deploy-contractor-agent']

  # Deploy API Gateway
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        AGENT_URL=$$(gcloud run services describe building-permit-agent --platform managed --region ${_LOCATION} --format='value(status.url)')
        ASSESSOR_URL=$$(gcloud run services describe building-permit-assessor-mcp --platform managed --region ${_LOCATION} --format='value(status.url)')
        
        gcloud run deploy building-permit-api \
          --image ${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/api:latest \
          --platform managed \
          --region ${_LOCATION} \
          --allow-unauthenticated \
          --set-env-vars "AGENT_URL=$$AGENT_URL,ASSESSOR_URL=$$ASSESSOR_URL"
    id: 'deploy-api'
    waitFor: ['push-api', 'deploy-agent', 'deploy-assessor-mcp']

  # Deploy Frontend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        API_URL=$$(gcloud run services describe building-permit-api --platform managed --region ${_LOCATION} --format='value(status.url)')
        
        gcloud run deploy building-permit-frontend \
          --image ${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/frontend:latest \
          --platform managed \
          --region ${_LOCATION} \
          --allow-unauthenticated \
          --set-env-vars "API_BACKEND_SERVICE_URL=$$API_URL"
    id: 'deploy-frontend'
    waitFor: ['push-frontend', 'deploy-api']

images:
  - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/agent:$COMMIT_SHA'
  - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/agent:latest'
  - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/contractor-agent:$COMMIT_SHA'
  - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/contractor-agent:latest'
  - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/assessor-mcp-server:$COMMIT_SHA'
  - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/assessor-mcp-server:latest'
  - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/api:$COMMIT_SHA'
  - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/api:latest'
  - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/frontend:$COMMIT_SHA'
  - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/frontend:latest'

substitutions:
  _LOCATION: 'us-central1'
  _REPO_NAME: 'building-permit'
  _GOOGLE_MAPS_API_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
